name: Arduino Bulut Derleyici

on:
  workflow_dispatch:
    inputs:
      sketch_code:
        description: 'Kod'
        required: true
      libraries:
        description: 'Kütüphaneler'
        required: false
      library_files:
        description: 'Uygulamadan zip kütüphaneler (JSON)'
        required: false
      board_type:
        description: 'Kart Modeli'
        required: true
        default: 'arduino:avr:uno'

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Arduino CLI El ile Kur
        run: |
          curl -fsSL https://raw.githubusercontent.com/arduino/arduino-cli/master/install.sh | sh
          echo "$GITHUB_WORKSPACE/bin" >> $GITHUB_PATH

      - name: Arduino AVR Çekirdek ve Kütüphane Önbelleği
        uses: actions/cache@v4
        with:
          path: |
            ~/.arduino15
            ~/Arduino/libraries
          key: ${{ runner.os }}-arduino-avr-v1

      - name: Derleyici ve Kütüphaneleri Hazırla
        run: |
          ./bin/arduino-cli core update-index
          ./bin/arduino-cli core install arduino:avr

          LIBS="${{ github.event.inputs.libraries }}"
          if [ ! -z "$LIBS" ]; then
            echo "$LIBS" | tr ',' '\n' | while read lib; do
              trim_lib=$(echo "$lib" | xargs)
              if [ ! -z "$trim_lib" ]; then
                echo "--- İşleniyor: $trim_lib ---"

                if [[ "${trim_lib,,}" == *"dht"* ]]; then
                  ./bin/arduino-cli lib install "DHT sensor library"
                  ./bin/arduino-cli lib install "Adafruit Unified Sensor"
                  continue
                elif [[ "${trim_lib,,}" == *"adafruit_gfx"* || "${trim_lib,,}" == *"gfx"* ]]; then
                  ./bin/arduino-cli lib install "Adafruit GFX Library"
                  ./bin/arduino-cli lib install "Adafruit BusIO"
                  continue
                elif [[ "${trim_lib,,}" == *"tinygps"* ]]; then
                  ./bin/arduino-cli lib install "TinyGPSPlus"
                  continue
                elif [[ "${trim_lib,,}" == *"ds1302"* ]]; then
                  ./bin/arduino-cli lib install "DS1302"
                  continue
                elif [[ "${trim_lib,,}" == *"pwmservo"* || "${trim_lib,,}" == *"adafruit_pwm"* ]]; then
                  ./bin/arduino-cli lib install "Adafruit PWM Servo Driver Library"
                  ./bin/arduino-cli lib install "Adafruit BusIO"
                  continue
                elif [[ "${trim_lib,,}" == *"audiogenerator"* || "${trim_lib,,}" == *"esp8266audio"* ]]; then
                  ./bin/arduino-cli lib install "ESP8266Audio"
                  continue
                elif [[ "${trim_lib,,}" == *"afmotor"* ]]; then
                  ./bin/arduino-cli lib install "Adafruit Motor Shield library"
                  continue
                fi

                if ./bin/arduino-cli lib install "$trim_lib"; then
                  echo "$trim_lib başarıyla kuruldu."
                else
                  echo "$trim_lib bulunamadı, arama yapılıyor..."
                  SEARCH_NAME=$(./bin/arduino-cli lib search "$trim_lib" --format text | grep "Name:" | head -n 1 | cut -d' ' -f2- | tr -d '"' | xargs)

                  if [ ! -z "$SEARCH_NAME" ]; then
                    echo "Bulunan isim: $SEARCH_NAME. Kuruluyor..."
                    ./bin/arduino-cli lib install "$SEARCH_NAME" || echo "Kurulum başarısız."
                  else
                    echo "$trim_lib için kütüphane bulunamadı."
                  fi
                fi
              fi
            done
          fi

      - name: Uygulamadan gelen kütüphane zip dosyaları
        env:
          LIBRARY_FILES: ${{ github.event.inputs.library_files }}
        run: |
          python3 <<'PY'
          import os, json, base64, zipfile
          from io import BytesIO
          raw = os.environ.get("LIBRARY_FILES", "")
          if not raw.strip():
              print("library_files bos, atlaniyor")
          else:
              libs = os.path.expanduser("~/Arduino/libraries")
              os.makedirs(libs, exist_ok=True)
              for item in json.loads(raw):
                  name = (item.get("name") or "CustomLib").strip()
                  data = base64.b64decode(item.get("zip") or "")
                  root = os.path.join(libs, name)
                  os.makedirs(root, exist_ok=True)
                  with zipfile.ZipFile(BytesIO(data)) as zf:
                      zf.extractall(root)
                  print("Installed", name)
          PY

      - name: Sketch ve Derleme
        run: |
          mkdir -p MySketch
          cat <<EOF > MySketch/MySketch.ino
          ${{ github.event.inputs.sketch_code }}
          EOF

          ./bin/arduino-cli compile --fqbn ${{ github.event.inputs.board_type }} MySketch --output-dir ./output

      - name: HEX Yayınla
        uses: actions/upload-artifact@v4
        with:
          name: arduino_build
          path: output/MySketch.ino.hex
          if-no-files-found: error
