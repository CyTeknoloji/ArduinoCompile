name: Arduino Bulut Derleyici

on:
  workflow_dispatch:
    inputs:
      sketch_code:
        description: 'Kod'
        required: true
      libraries:
        description: 'Kütüphaneler'
        required: false
      library_files:
        description: 'Uygulamadan zip kütüphaneler (JSON)'
        required: false
      board_type:
        description: 'Kart Modeli'
        required: true
        default: 'arduino:avr:uno'

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Arduino CLI El ile Kur
        run: |
          curl -fsSL https://raw.githubusercontent.com/arduino/arduino-cli/master/install.sh | sh
          echo "$GITHUB_WORKSPACE/bin" >> $GITHUB_PATH

      - name: Arduino AVR Çekirdek ve Kütüphane Önbelleği
        uses: actions/cache@v4
        with:
          path: |
            ~/.arduino15
            ~/Arduino/libraries
          key: ${{ runner.os }}-arduino-avr-v2

      - name: Derleyici ve Kütüphaneleri Hazırla
        env:
          LIBS: ${{ github.event.inputs.libraries }}
        run: |
          CLI=./bin/arduino-cli
          $CLI core update-index
          $CLI core install arduino:avr

          echo "Uygulamadan gelen kutuphane listesi: [${LIBS:-bos}]"

          install_one() {
            local trim_lib="$1"
            [ -z "$trim_lib" ] && return 0
            echo "--- Isleniyor: $trim_lib ---"

            local key="${trim_lib,,}"
            case "$key" in
              *dht*) $CLI lib install "DHT sensor library" || true; $CLI lib install "Adafruit Unified Sensor" || true; return 0 ;;
              *adafruit_gfx*|*gfx*) $CLI lib install "Adafruit GFX Library" || true; $CLI lib install "Adafruit BusIO" || true; return 0 ;;
              *adafruit_ssd*) $CLI lib install "Adafruit SSD1306" || true; $CLI lib install "Adafruit BusIO" || true; return 0 ;;
              *adafruit_pcd*) $CLI lib install "Adafruit PCD8544" || true; $CLI lib install "Adafruit BusIO" || true; return 0 ;;
              *adafruit_mlx*) $CLI lib install "Adafruit MLX90614 Library" || true; $CLI lib install "Adafruit BusIO" || true; return 0 ;;
              *adafruit_tcs*) $CLI lib install "Adafruit TCS34725" || true; return 0 ;;
              *adafruit_neo*) $CLI lib install "Adafruit NeoPixel" || true; return 0 ;;
              *mfrc*) $CLI lib install "MFRC522" || true; return 0 ;;
              *tinygps*) $CLI lib install "TinyGPSPlus" || true; return 0 ;;
              *ds1302*) $CLI lib install "DS1302" || true; return 0 ;;
              *rtc*) $CLI lib install "RTClib" || true; return 0 ;;
              *pwmservo*|*adafruit_pwm*) $CLI lib install "Adafruit PWM Servo Driver Library" || true; $CLI lib install "Adafruit BusIO" || true; return 0 ;;
              *varspeed*) $CLI lib install "VarSpeedServo" || true; return 0 ;;
              *servo*) $CLI lib install "Servo" || true; return 0 ;;
              *stepper*) $CLI lib install "Stepper" || true; return 0 ;;
              *accel*) $CLI lib install "AccelStepper" || true; return 0 ;;
              *liquidcrystal*) $CLI lib install "LiquidCrystal I2C" || true; return 0 ;;
              *onewire*) $CLI lib install "OneWire" || true; return 0 ;;
              *dallas*) $CLI lib install "DallasTemperature" || true; return 0 ;;
              *hx711*) $CLI lib install "HX711 Arduino Library" || true; return 0 ;;
              *irremote*) $CLI lib install "IRremote" || true; return 0 ;;
              *keypad*) $CLI lib install "Keypad" || true; return 0 ;;
              *arduinojson*) $CLI lib install "ArduinoJson" || true; return 0 ;;
              *pubsub*) $CLI lib install "PubSubClient" || true; return 0 ;;
              *pulse*) $CLI lib install "PulseSensor Playground" || true; return 0 ;;
              *touchscreen*) $CLI lib install "TouchScreen" || true; return 0 ;;
              *softwareserial*) $CLI lib install "SoftwareSerial" || true; return 0 ;;
              *audiogenerator*|*esp8266audio*) $CLI lib install "ESP8266Audio" || true; return 0 ;;
              *afmotor*) $CLI lib install "Adafruit Motor Shield library" || true; return 0 ;;
            esac

            if $CLI lib install "$trim_lib"; then
              echo "$trim_lib kuruldu."
            else
              echo "$trim_lib bulunamadi, arama yapiliyor..."
              SEARCH_NAME=$($CLI lib search "$trim_lib" --format text | grep "Name:" | head -n 1 | cut -d' ' -f2- | tr -d '"' | xargs)
              if [ -n "$SEARCH_NAME" ]; then
                echo "Bulunan: $SEARCH_NAME"
                $CLI lib install "$SEARCH_NAME" || echo "Kurulum basarisiz."
              else
                echo "$trim_lib icin kutuphane bulunamadi."
              fi
            fi
          }

          if [ -n "${LIBS:-}" ]; then
            echo "$LIBS" | tr ',' '\n' | while IFS= read -r lib; do
              install_one "$(echo "$lib" | xargs)"
            done
          fi

      - name: Uygulamadan gelen kütüphane zip dosyaları
        env:
          LIBRARY_FILES: ${{ github.event.inputs.library_files }}
        run: |
          python3 <<'PY'
          import os, json, base64, zipfile, shutil, tempfile
          from io import BytesIO
          raw = os.environ.get("LIBRARY_FILES", "")
          if not raw.strip():
              print("library_files bos, atlaniyor")
          else:
              libs = os.path.expanduser("~/Arduino/libraries")
              os.makedirs(libs, exist_ok=True)
              for item in json.loads(raw):
                  name = (item.get("name") or "CustomLib").strip()
                  data = base64.b64decode(item.get("zip") or "")
                  target = os.path.join(libs, name)
                  os.makedirs(target, exist_ok=True)
                  with tempfile.TemporaryDirectory() as tmp:
                      with zipfile.ZipFile(BytesIO(data)) as zf:
                          zf.extractall(tmp)
                      entries = [e for e in os.listdir(tmp) if not e.startswith(".")]
                      if len(entries) == 1 and os.path.isdir(os.path.join(tmp, entries[0])):
                          root = os.path.join(tmp, entries[0])
                          for item_name in os.listdir(root):
                              src = os.path.join(root, item_name)
                              dst = os.path.join(target, item_name)
                              if os.path.isdir(src):
                                  shutil.copytree(src, dst, dirs_exist_ok=True)
                              else:
                                  shutil.copy2(src, dst)
                      else:
                          for item_name in entries:
                              src = os.path.join(tmp, item_name)
                              dst = os.path.join(target, item_name)
                              if os.path.isdir(src):
                                  shutil.copytree(src, dst, dirs_exist_ok=True)
                              else:
                                  shutil.copy2(src, dst)
                  print("Installed", name)
          PY

      - name: Sketch Hazırla
        shell: python
        env:
          SKETCH_INPUT: ${{ github.event.inputs.sketch_code }}
        run: |
          import os
          content = os.environ.get("SKETCH_INPUT", "")
          os.makedirs("MySketch", exist_ok=True)
          with open("MySketch/MySketch.ino", "w", encoding="utf-8") as f:
              f.write(content)

      - name: Derle
        run: |
          mkdir -p output
          ./bin/arduino-cli compile --fqbn ${{ github.event.inputs.board_type }} MySketch --output-dir ./output

      - name: HEX Yayınla
        uses: actions/upload-artifact@v4
        with:
          name: arduino_build
          path: output/MySketch.ino.hex
          if-no-files-found: error
