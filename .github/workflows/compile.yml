name: Arduino Bulut Derleyici

on:
  workflow_dispatch:
    inputs:
      sketch_code:
        description: 'Kod'
        required: true
      libraries:
        description: 'Kütüphaneler'
        required: false
      board_type: # YENİ: Kart tipi girişi
        description: 'Kart Modeli'
        required: true
        default: 'arduino:avr:uno'

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Arduino CLI El ile Kur
        run: |
          curl -fsSL https://raw.githubusercontent.com/arduino/arduino-cli/master/install.sh | sh
          # Bin klasörünü PATH'e ekliyoruz
          echo "$GITHUB_WORKSPACE/bin" >> $GITHUB_PATH

      - name: Derleyici ve Kütüphaneleri Hazırla
        run: |
          ./bin/arduino-cli core update-index
          ./bin/arduino-cli core install arduino:avr

          LIBS="${{ github.event.inputs.libraries }}"
          if [ ! -z "$LIBS" ]; then
            echo "$LIBS" | tr ',' '\n' | while read lib; do
              trim_lib=$(echo "$lib" | xargs)
              if [ ! -z "$trim_lib" ]; then
                echo "--- İşleniyor: $trim_lib ---"
                
                # ÖZEL DURUM: DHT ve GFX gibi kritik kütüphaneler için manuel eşleşme
                if [[ "$trim_lib" == "DHT" ]]; then
                  ./bin/arduino-cli lib install "DHT sensor library"
                  ./bin/arduino-cli lib install "Adafruit Unified Sensor"
                  continue
                elif [[ "$trim_lib" == "Adafruit_GFX" ]]; then
                  ./bin/arduino-cli lib install "Adafruit GFX Library"
                  continue
                fi

                # 1. Strateji: Direkt ismiyle dene
                if ./bin/arduino-cli lib install "$trim_lib"; then
                  echo "$trim_lib başarıyla kuruldu."
                else
                  echo "$trim_lib bulunamadı, arama yapılıyor..."
                  # 2. Strateji: Arama yap ve tırnakları temizle (Tırnak hatasını çözen kısım)
                  SEARCH_NAME=$(./bin/arduino-cli lib search "$trim_lib" --format text | grep "Name:" | head -n 1 | cut -d' ' -f2- | tr -d '"' | xargs)
                  
                  if [ ! -z "$SEARCH_NAME" ]; then
                    echo "Bulunan isim: $SEARCH_NAME. Kuruluyor..."
                    ./bin/arduino-cli lib install "$SEARCH_NAME" || echo "Kurulum başarısız."
                  else
                    echo "$trim_lib için kütüphane bulunamadı."
                  fi
                fi

                # BAĞIMLILIK KONTROLÜ
                if [[ "$trim_lib" == *"DHT"* || "$trim_lib" == *"GFX"* ]]; then
                  ./bin/arduino-cli lib install "Adafruit Unified Sensor" || true
                  ./bin/arduino-cli lib install "Adafruit BusIO" || true
                fi
              fi
            done
          fi
      - name: Sketch ve Derleme
        run: |
          mkdir -p MySketch
          # Kodu güvenli bir şekilde dosyaya yazıyoruz
          cat <<EOF > MySketch/MySketch.ino
          ${{ github.event.inputs.sketch_code }}
          EOF
          
          # Derleme işlemi
          ./bin/arduino-cli compile --fqbn ${{ github.event.inputs.board_type }} MySketch --output-dir ./output

      - name: HEX Yayınla
        uses: actions/upload-artifact@v4
        with:
          name: arduino_build
          path: output/MySketch.ino.hex
          if-no-files-found: error
